services:
  backend:
    build: ./backend
    container_name: backend
    image: ghcr.io/nacho50900/amitraceable-backend:latest
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    networks:
      - monitor-net

  webapp:
    build:
      context: ./webapp
      args:
        # Vacío: la imagen trae su propio nginx.conf que hace de proxy
        # hacia "backend" bajo el mismo origen (ver webapp/nginx.conf), así
        # que el frontend llama a la API con rutas relativas. Esto es lo
        # que permite que un túnel de Cloudflare apuntando SOLO a este
        # servicio (puerto 8080 en el host) sirva también, transparentemente,
        # todo lo de auth/instagram y auth/reddit.
        - VITE_API_URL=
    container_name: webapp
    image: ghcr.io/nacho50900/amitraceable-webapp:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./backend/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
