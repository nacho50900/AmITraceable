# Sirve la SPA y, además, hace de proxy hacia el backend para /auth/ y
# /api/ -- así webapp y backend comparten el MISMO origen de cara al
# navegador (sea `localhost:8080` en local, o la URL de un túnel de
# Cloudflare). Esto es justo lo que permite que el redirect_uri dinámico de
# Instagram (ver app/auth/instagram_oauth.py) y la redirección final tras
# el login funcionen sin tener que hardcodear ninguna URL en el frontend
# ni reconstruir la imagen cada vez que cambia la URL del túnel.
#
# "backend" es el nombre del servicio en docker-compose.yml -- Docker
# resuelve ese nombre por DNS interno a la IP del contenedor, tanto en
# local como en el despliegue en producción (mismo docker-compose.yml).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /auth/ {
        proxy_pass http://backend:3000;
        # Sin esto, el backend vería como Host "backend:3000" en vez del
        # host público real (el del túnel/dominio) -- y el redirect_uri
        # dinámico saldría mal.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # El endpoint de progreso en vivo (/api/analyze/{platform}/stream)
        # es Server-Sent Events: sin desactivar el buffering, nginx
        # acumularía los eventos y el navegador no vería nada hasta que
        # el análisis entero terminase.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
