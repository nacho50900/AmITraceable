name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: npm --prefix webapp ci
      - run: npm --prefix webapp run test:coverage

      - name: Install backend (Python) dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Run backend tests with coverage
        env:
          # Los tests de ai_analysis.py usan respx.mock para simular las
          # respuestas de Mistral, así que NO necesitan una key real para
          # pasar. Se inyecta igualmente por si en el futuro se añade algún
          # test de integración real que sí la requiera; si el secret no
          # está definido en el repo, la variable llega vacía y
          # Settings.mistral_api_key queda en None (comportamiento normal
          # de "IA no configurada", no un fallo de CI).
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: cd backend && pytest --cov=app --cov-report=xml --cov-report=term

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}