name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            users/requirements.txt
            users/requirements-dev.txt

      - run: npm --prefix webapp ci
      - run: npm --prefix webapp run test:coverage

      - name: Install users (Python) dependencies
        run: pip install -r users/requirements-dev.txt

      - name: Install spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Run users tests with coverage
        run: cd users && pytest --cov=app --cov-report=xml --cov-report=term

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}