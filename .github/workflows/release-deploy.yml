name: Release — Test, Build, Publish, Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.event.release.tag_name }}

jobs:
  test-webapp:
    name: Run webapp unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd webapp
          npm ci

      - name: Run tests
        run: |
          cd webapp
          npm test

  test-users:
    name: Run users (Python) unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r users/requirements-dev.txt

      - name: Install spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Run tests
        run: cd users && pytest

  e2e:
    name: Run E2E tests
    runs-on: ubuntu-latest
    needs: [test-webapp, test-users]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install users dependencies
        run: pip install -r users/requirements.txt
      - name: Install spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm
      - name: Install webapp dependencies
        run: |
          cd webapp
          npm ci
      - name: Install Playwright browsers
        run: |
          cd webapp
          npm run test:e2e:install-browsers
      - name: Run E2E tests (start servers and run cucumber)
        run: |
          cd webapp
          npm run test:e2e

  docker-push-users:
    name: Publish users image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (users)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-users
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: users

  docker-push-webapp:
    name: Publish webapp image
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Registry (webapp)
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: ${{ github.repository_owner }}/${{ github.event.repository.name }}-webapp
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          workdir: webapp
          buildargs: VITE_API_URL=http://${{ secrets.DEPLOY_HOST }}:3000

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: [docker-push-users, docker-push-webapp]
    steps:
      - name: Deploy over SSH
        uses: fifsky/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          user: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command: |
            wget https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/master/docker-compose.yml -O docker-compose.yml
            docker compose down
            docker compose up -d --pull always
